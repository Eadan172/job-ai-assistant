<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 450px;
            min-height: 600px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0;
        }
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header h1 {
            font-size: 18px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            user-select: none;
        }
        .tab:hover {
            background: #f5f5f5;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        .tab-content {
            display: none;
            background: white;
            padding: 15px;
            min-height: 400px;
        }
        .tab-content.active {
            display: block;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-success:hover {
            background: #45a049;
        }
        .job-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .job-item {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .job-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        .job-item h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }
        .job-item .company {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .job-item .salary {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .job-item .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .job-item .tag {
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-area input {
            display: none;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .upload-text {
            font-size: 14px;
            color: #666;
        }
        .analysis-result {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .analysis-result h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }
        .analysis-item {
            margin-bottom: 8px;
            font-size: 13px;
        }
        .analysis-item label {
            font-weight: 600;
            color: #666;
        }
        .analysis-item span {
            color: #333;
        }
        .chat-container {
            border: 1px solid #eee;
            border-radius: 8px;
            height: 300px;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
        }
        .chat-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        .chat-message.assistant {
            background: #f0f0f0;
            color: #333;
        }
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        .chat-input button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .settings-item label {
            font-size: 14px;
            color: #333;
        }
        .settings-item select, .settings-item input[type="text"] {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 招聘AI助手</h1>
        <div class="status">
            <span class="status-dot"></span>
            <span id="server-status">服务运行中</span>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-tab="jobs">📋 岗位</div>
        <div class="tab" data-tab="resume">📄 简历</div>
        <div class="tab" data-tab="chat">💬 对话</div>
        <div class="tab" data-tab="settings">⚙️ 设置</div>
    </div>
    
    <div id="jobs" class="tab-content active">
        <div class="section">
            <div class="section-title">📍 当前页面</div>
            <div id="current-page">检测中...</div>
        </div>
        
        <div class="section">
            <button class="btn btn-primary" id="scrape-jobs">🔍 爬取当前页面岗位</button>
            <button class="btn btn-success" id="analyze-jobs">🤖 AI 分析岗位</button>
            <button class="btn btn-secondary" id="export-markdown">📥 导出 Markdown</button>
            <button class="btn btn-secondary" id="clear-jobs">🗑️ 清空岗位数据</button>
        </div>
        
        <div class="section" id="analysis-section" style="display: none;">
            <div class="section-title">📊 AI 分析结果</div>
            <div class="analysis-result" id="analysis-result"></div>
        </div>
        
        <div class="section">
            <div class="section-title">📊 岗位列表 (<span id="job-count">0</span>)</div>
            <div class="job-list" id="job-list">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <div>暂无岗位数据</div>
                    <div style="font-size: 12px; margin-top: 5px;">请访问招聘网站并点击"爬取岗位"</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="resume" class="tab-content">
        <div class="section">
            <div class="section-title">📤 上传简历</div>
            <div class="upload-area" id="upload-area">
                <input type="file" id="resume-upload" accept=".pdf,.docx,.txt" />
                <div class="upload-icon">📄</div>
                <div class="upload-text">点击或拖拽上传简历<br><small>支持 PDF / DOCX / TXT</small></div>
            </div>
        </div>
        
        <div class="section" id="resume-info" style="display: none;">
            <div class="section-title">ℹ️ 简历信息</div>
            <div id="resume-basic-info"></div>
        </div>
        
        <div class="section">
            <button class="btn btn-primary" id="analyze-resume">🤖 AI 分析简历</button>
            <button class="btn btn-success" id="optimize-resume">✨ AI 优化简历</button>
            <button class="btn btn-secondary" id="download-resume">📥 下载分析报告</button>
        </div>
        
        <div class="section" id="analysis-section" style="display: none;">
            <div class="section-title">📊 分析结果</div>
            <div class="analysis-result" id="analysis-result"></div>
        </div>
    </div>
    
    <div id="chat" class="tab-content">
        <div class="section">
            <div class="section-title">💬 AI 助手对话</div>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-message assistant">
                        👋 您好！我是招聘AI助手，可以帮您：
                        <br>• 分析岗位要求
                        <br>• 优化简历内容
                        <br>• 生成求职建议
                        <br>• 模拟面试问答
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="输入您的问题..." />
                    <button id="send-message">发送</button>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">🎯 快捷功能</div>
            <button class="btn btn-secondary" id="quick-match">📊 匹配度分析</button>
            <button class="btn btn-secondary" id="quick-interview">🎤 模拟面试</button>
            <button class="btn btn-secondary" id="quick-salary">💰 薪资建议</button>
        </div>
    </div>
    
    <div id="settings" class="tab-content">
        <div class="section">
            <div class="section-title">🤖 AI 模型设置</div>
            <div class="settings-item">
                <label>模型类型</label>
                <select id="model-type">
                    <option value="deepseek">DeepSeek API</option>
                    <option value="qwen">通义千问 API</option>
                    <option value="glm">智谱 GLM API</option>
                </select>
            </div>
            <div class="settings-item">
                <label>API Key</label>
                <input type="password" id="api-key" placeholder="输入 API Key" style="width: 200px;" />
            </div>
        </div>
        
        <div class="section" id="personal-info-section">
            <div class="section-title">👤 个人信息（用于自动填充）</div>
            <div class="settings-item">
                <label>姓名</label>
                <input type="text" id="user-name" placeholder="张三" />
            </div>
            <div class="settings-item">
                <label>手机</label>
                <input type="text" id="user-phone" placeholder="13800138000" />
            </div>
            <div class="settings-item">
                <label>邮箱</label>
                <input type="text" id="user-email" placeholder="email@example.com" />
            </div>
        </div>
        
        <div class="section">
            <button class="btn btn-primary" id="save-settings">💾 保存设置</button>
            <button class="btn btn-secondary" id="test-connection">🔌 测试连接</button>
        </div>
        
        <div class="section">
            <div class="section-title">📊 统计信息</div>
            <div class="settings-item">
                <label>已爬取岗位</label>
                <span id="stats-jobs">0</span>
            </div>
            <div class="settings-item">
                <label>已分析简历</label>
                <span id="stats-resumes">0</span>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
